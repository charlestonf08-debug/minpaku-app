<script type="text/jsx-src">
const { useState, useEffect, useCallback, useRef, useMemo, createContext, useContext } = React;

// ============================================================
// CONSTANTS
// ============================================================
const CLEANING_RATE_ONE = 8000;
const CLEANING_RATE_TWO = 6000;
const FIXED_EXPENSE_CATEGORIES = ['家賃','電気代','ガス代','水道代','ゴミ回収費','Wi-Fi費'];
const VARIABLE_EXPENSE_CATEGORIES = ['消耗品','備品','特別費','その他'];
const MONTHS_JP = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];

// ============================================================
// SUPABASE SETUP
// ============================================================
const SUPABASE_URL = 'https://fboitvepwmlckkuwrova.supabase.co';
const SUPABASE_KEY = 'sb_publishable_OGjYn5sX9x6GhUHJUhBuzw_a1mGDzpz';

// Legacy localStorage support (ignored now that credentials are hardcoded)
const CONFIG_KEY = 'minpaku_supabase_config';
function getConfig() { return { url: SUPABASE_URL, key: SUPABASE_KEY }; }
function saveConfig() {}

let supabaseClient = null;
function getSupabase() {
  if (supabaseClient) return supabaseClient;
  supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  return supabaseClient;
}

// ============================================================
// UTILITY
// ============================================================
function fmt(n) {
  if (n === null || n === undefined || isNaN(n)) return '¥0';
  return '¥' + Math.abs(n).toLocaleString('ja-JP');
}

function fmtSigned(n) {
  if (!n) return '¥0';
  return (n < 0 ? '-' : '') + fmt(Math.abs(n));
}

function today() {
  const d = new Date();
  return { year: d.getFullYear(), month: d.getMonth() + 1 };
}

function daysInMonth(year, month) {
  return new Date(year, month, 0).getDate();
}

function dayOfWeek(year, month, day) {
  return new Date(year, month - 1, day).getDay();
}

function isoDate(year, month, day) {
  return `${year}-${String(month).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
}

// ============================================================
// APP CONTEXT
// ============================================================
const AppCtx = createContext(null);

function useApp() { return useContext(AppCtx); }

// ============================================================
// SETUP SCREEN
// ============================================================
function SetupScreen({ onSetup }) {
  const [url, setUrl] = useState('');
  const [key, setKey] = useState('');
  const [err, setErr] = useState('');
  const [loading, setLoading] = useState(false);

  async function handleSave(e) {
    e.preventDefault();
    if (!url.trim() || !key.trim()) { setErr('URLとAnon Keyを入力してください'); return; }
    setLoading(true); setErr('');
    try {
      const client = supabase.createClient(url.trim(), key.trim());
      const { error } = await client.from('properties').select('id').limit(1);
      if (error) throw error;
      saveConfig(url.trim(), key.trim());
      supabaseClient = null;
      onSetup();
    } catch(e) {
      setErr('接続失敗: ' + (e.message || 'URLまたはKeyを確認してください'));
    } finally { setLoading(false); }
  }

  return (
    <div className="min-h-screen bg-gradient-to-br from-blue-600 to-indigo-700 flex items-center justify-center p-4">
      <div className="bg-white rounded-2xl shadow-xl p-8 w-full max-w-md">
        <div className="text-center mb-8">
          <div className="text-4xl mb-3">🏠</div>
          <h1 className="text-2xl font-bold text-gray-800">我々は最強だ！<br/>ワクワク民泊管理システム</h1>
          <p className="text-gray-500 text-sm mt-2">初回設定：Supabase接続情報を入力</p>
        </div>
        <form onSubmit={handleSave} className="space-y-4">
          <div>
            <label className="block text-sm font-medium text-gray-700 mb-1">Supabase URL</label>
            <input className="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-primary"
              placeholder="https://xxx.supabase.co" value={url} onChange={e => setUrl(e.target.value)} />
          </div>
          <div>
            <label className="block text-sm font-medium text-gray-700 mb-1">Anon Key</label>
            <input className="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-primary"
              placeholder="eyJhbGci..." value={key} onChange={e => setKey(e.target.value)} type="password" />
          </div>
          {err && <p className="text-red-500 text-sm">{err}</p>}
          <button type="submit" disabled={loading}
            className="w-full bg-primary text-white rounded-lg py-3 font-medium hover:bg-primary-dark disabled:opacity-50 transition-colors">
            {loading ? '接続中...' : '接続して開始'}
          </button>
        </form>
        <p className="text-xs text-gray-400 mt-4 text-center">Supabase Dashboardから取得してください</p>
      </div>
    </div>
  );
}

// ============================================================
// LOGIN SCREEN
// ============================================================
function LoginScreen({ onLogin }) {
  const [email, setEmail] = useState('');
  const [pw, setPw] = useState('');
  const [err, setErr] = useState('');
  const [loading, setLoading] = useState(false);

  async function handleLogin(e) {
    e.preventDefault();
    setLoading(true); setErr('');
    try {
      const sb = getSupabase();
      const { error } = await sb.auth.signInWithPassword({ email: email.trim(), password: pw });
      if (error) throw error;
      onLogin();
    } catch(e) {
      setErr('ログイン失敗: ' + (e.message || 'メール・パスワードを確認してください'));
    } finally { setLoading(false); }
  }

  return (
    <div className="min-h-screen bg-gradient-to-br from-blue-600 to-indigo-700 flex items-center justify-center p-4">
      <div className="bg-white rounded-2xl shadow-xl p-8 w-full max-w-md">
        <div className="text-center mb-8">
          <div className="text-4xl mb-3">🏠</div>
          <h1 className="text-2xl font-bold text-gray-800">我々は最強だ！<br/>ワクワク民泊管理システム</h1>
          <p className="text-gray-500 text-sm mt-1">かわけん・りょうこ 共同運営</p>
        </div>
        <form onSubmit={handleLogin} className="space-y-4">
          <div>
            <label className="block text-sm font-medium text-gray-700 mb-1">メールアドレス</label>
            <input className="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-primary"
              type="email" placeholder="mail@example.com" value={email} onChange={e => setEmail(e.target.value)} />
          </div>
          <div>
            <label className="block text-sm font-medium text-gray-700 mb-1">パスワード</label>
            <input className="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-primary"
              type="password" value={pw} onChange={e => setPw(e.target.value)} />
          </div>
          {err && <p className="text-red-500 text-sm">{err}</p>}
          <button type="submit" disabled={loading}
            className="w-full bg-primary text-white rounded-lg py-3 font-medium hover:bg-primary-dark disabled:opacity-50 transition-colors">
            {loading ? 'ログイン中...' : 'ログイン'}
          </button>
        </form>
      </div>
    </div>

}

// ============================================================
// SHARED UI COMPONENTS
// ============================================================
function Card({ children, className='' }) {
  return <div className={`bg-white rounded-xl shadow-sm border border-gray-100 ${className}`}>{children}</div>;
}

function SectionTitle({ children }) {
  return <h2 className="text-base font-bold text-gray-700 mb-3">{children}</h2>;
}

function MonthPicker({ year, month, onChange }) {
  function prev() {
    let m = month - 1, y = year;
    if (m < 1) { m = 12; y--; }
    onChange(y, m);
  }
  function next() {
    let m = month + 1, y = year;
    if (m > 12) { m = 1; y++; }
    onChange(y, m);
  }
  const isCurrentMonth = (() => { const t = today(); return t.year === year && t.month === month; })();
  return (
    <div className="flex items-center gap-3">
      <button onClick={prev} className="w-8 h-8 rounded-full bg-gray-100 flex items-center justify-center text-gray-600 hover:bg-gray-200 transition-colors">‹</button>
      <span className="font-semibold text-gray-800 min-w-[90px] text-center">{year}年{month}月</span>
      <button onClick={next} disabled={isCurrentMonth} className="w-8 h-8 rounded-full bg-gray-100 flex items-center justify-center text-gray-600 hover:bg-gray-200 transition-colors disabled:opacity-30">›</button>
    </div>
  );
}

function Badge({ text, color='gray' }) {
  const colors = { gray:'bg-gray-100 text-gray-600', blue:'bg-primary/20 text-primary-dark', green:'bg-green-100 text-green-700', orange:'bg-orange-100 text-orange-700', red:'bg-red-100 text-red-700', purple:'bg-[#FA8072]/20 text-[#c0504d]', sanno:'prop-sanno', tamatsu:'prop-tamatsu', tachibana:'prop-tachibana' };
  return <span className={`text-xs px-2 py-0.5 rounded-full font-medium ${colors[color]||colors.gray}`}>{text}</span>;
}

function Modal({ show, onClose, title, children }) {
  if (!show) return null;
  return (
    <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center p-0 sm:p-4" onClick={onClose}>
      <div className="absolute inset-0 bg-black/50" />
      <div className="relative bg-white w-full sm:max-w-lg sm:rounded-2xl rounded-t-2xl max-h-[90vh] overflow-y-auto" onClick={e => e.stopPropagation()}>
        <div className="sticky top-0 bg-white border-b border-gray-100 px-5 py-4 flex items-center justify-between rounded-t-2xl">
          <h3 className="font-bold text-gray-800">{title}</h3>
          <button onClick={onClose} className="text-gray-400 hover:text-gray-600 text-xl">✕</button>
        </div>
        <div className="p-5">{children}</div>
      </div>
    </div>
  );
}

function Spinner() {
  return <div className="flex items-center justify-center py-12"><div className="w-8 h-8 border-3 border-primary border-t-transparent rounded-full animate-spin" style={{borderWidth:'3px'}}></div></div>;
}

function AmountInput({ label, value, onChange, placeholder='0' }) {
  return (
    <div>
      {label && <label className="block text-xs font-medium text-gray-600 mb-1">{label}</label>}
      <div className="relative">
        <span className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm">¥</span>
        <input type="number" min="0" value={value||''} onChange={e => onChange(Number(e.target.value)||0)}
          placeholder={placeholder}
          className="w-full border border-gray-300 rounded-lg pl-7 pr-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary" />
      </div>
    </div>
  );
}

// ============================================================
// DATA HOOKS
// ============================================================
function useData(table, query) {
  const [data, setData] = useState([]);
  const [loading, setLoading] = useState(true);

  const load = useCallback(async () => {
    try {
      const sb = getSupabase();
      let q = sb.from(table).select(query || '*');
      const { data: rows, error } = await q;
      if (error) throw error;
      setData(rows || []);
    } catch(e) { console.error(table, e); }
    finally { setLoading(false); }
  }, [table]);

  useEffect(() => { load(); }, [load]);
  return { data, loading, reload: load };
}

// ============================================================
// SETTINGS PAGE
// ============================================================
function SettingsPage() {
  const [tab, setTab] = useState('staff');
  const tabs = [
    { id:'staff', label:'スタッフ' },
    { id:'transport', label:'交通費' },
    { id:'recurring', label:'定期費用' },
    { id:'bonus', label:'臨時払い' },
    { id:'system', label:'システム' },
  ];
  return (
    <div className="pb-24">
      <div className="bg-white border-b border-gray-200 sticky top-0 z-10">
        <div className="flex overflow-x-auto">
          {tabs.map(t => (
            <button key={t.id} onClick={() => setTab(t.id)}
              className={`flex-shrink-0 flex-1 py-2.5 text-xs font-medium border-b-2 transition-colors ${tab===t.id ? 'border-primary text-primary' : 'border-transparent text-gray-500'}`}>

        {tab === 'staff' && <StaffSettings />}

        {tab === 'recurring' && <RecurringExpensesSettings />}

function StaffSettings() {
  const { data: staff, loading, reload } = useData('staff', '*');
  const [showForm, setShowForm] = useState(false);
  const [editItem, setEditItem] = useState(null);
  const [name, setName] = useState('');
  const [err, setErr] = useState('');
  const [saving, setSaving] = useState(false);

  const sorted = useMemo(() => {
    const order = { kawaken: 0, ryoko: 1, external: 2 };
    return [...staff].sort((a,b) => (order[a.type]||2) - (order[b.type]||2));
  }, [staff]);

  function openAdd() { setEditItem(null); setName(''); setErr(''); setShowForm(true); }
  function openEdit(s) { setEditItem(s); setName(s.name); setErr(''); setShowForm(true); }

  async function save() {
    if (!name.trim()) { setErr('名前を入力してください'); return; }
    setSaving(true);
    try {
      const sb = getSupabase();
      if (editItem) {
        await sb.from('staff').update({ name: name.trim() }).eq('id', editItem.id);
      } else {
        await sb.from('staff').insert({ name: name.trim(), type: 'external', active: true });
      }
      setShowForm(false); reload();
    } catch(e) { setErr(e.message); }
    finally { setSaving(false); }
  }

  async function toggleActive(s) {
    if (s.type !== 'external') return;
    await getSupabase().from('staff').update({ active: !s.active }).eq('id', s.id);
    reload();
  }

  const typeLabel = { kawaken:'かわけん', ryoko:'りょうこ', external:'外部' };
  const typeColor = { kawaken:'blue', ryoko:'purple', external:'gray' };

  return (
    <div>
      <div className="flex items-center justify-between mb-4">
        <SectionTitle>スタッフ管理</SectionTitle>
        <button onClick={openAdd} className="bg-primary text-white px-4 py-1.5 rounded-lg text-sm font-medium">+ 追加</button>
      </div>
      {loading ? <Spinner /> : (
        <div className="space-y-2">
          {sorted.map(s => (
            <Card key={s.id} className="p-3 flex items-center justify-between">
              <div className="flex items-center gap-3">
                <div className={`w-8 h-8 rounded-full flex items-center justify-center text-sm font-bold ${s.type==='kawaken'?'bg-primary/15 text-primary':s.type==='ryoko'?'bg-[#FA8072]/20 text-[#c0504d]':'bg-gray-100 text-gray-600'}`}>
                  {s.name[0]}
                </div>
                <div>
                  <p className="font-medium text-gray-800 text-sm">{s.name}</p>
                  <Badge text={typeLabel[s.type]||s.type} color={typeColor[s.type]||'gray'} />
                </div>
              </div>
              <div className="flex items-center gap-2">
                {!s.active && <Badge text="無効" color="red" />}
                {s.type === 'external' && (
                  <>
                    <button onClick={() => openEdit(s)} className="text-xs text-primary px-2 py-1 border border-primary/30 rounded-lg">編集</button>
                    <button onClick={() => toggleActive(s)} className={`text-xs px-2 py-1 border rounded-lg ${s.active ? 'text-red-500 border-red-200' : 'text-green-600 border-green-200'}`}>
                      {s.active ? '無効化' : '有効化'}
                    </button>
                  </>
                )}
              </div>
            </Card>
          ))}
        </div>
      )}
      <Modal show={showForm} onClose={() => setShowForm(false)} title={editItem ? 'スタッフ編集' : '外部スタッフ追加'}>
        <div className="space-y-4">
          <div>
            <label className="block text-sm font-medium text-gray-700 mb-1">名前</label>
            <input className="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary"
              placeholder="例：田中さん" value={name} onChange={e => setName(e.target.value)} autoFocus />
          </div>
          {err && <p className="text-red-500 text-sm">{err}</p>}
          <button onClick={save} disabled={saving}
            className="w-full bg-primary text-white rounded-lg py-2.5 font-medium disabled:opacity-50">
            {saving ? '保存中...' : '保存'}
          </button>
        </div>
      </Modal>
    </div>
  );
}

function TransportFeeSettings() {
  const { data: staff } = useData('staff', '*');
  const { data: properties } = useData('properties', '*');
  const { data: fees, reload } = useData('staff_transport_fees', '*');
  const [saving, setSaving] = useState({});

  const activeStaff = useMemo(() => {
    const order = { kawaken:0, ryoko:1, external:2 };
    return staff.filter(s => s.active).sort((a,b)=>(order[a.type]||2)-(order[b.type]||2));
  }, [staff]);

  const sortedProps = useMemo(() => [...properties].sort((a,b)=>a.sort_order-b.sort_order), [properties]);

  function getFee(staffId, propId) {
    const f = fees.find(x => x.staff_id === staffId && x.property_id === propId);
    return f ? f.amount : 0;
  }

  async function setFee(staffId, propId, amount) {
    const key = `${staffId}-${propId}`;
    setSaving(s => ({ ...s, [key]: true }));
    try {
      const sb = getSupabase();
      const existing = fees.find(x => x.staff_id === staffId && x.property_id === propId);
      if (existing) {
        await sb.from('staff_transport_fees').update({ amount }).eq('id', existing.id);
      } else {
        await sb.from('staff_transport_fees').insert({ staff_id: staffId, property_id: propId, amount });
      }
      reload();
    } finally { setSaving(s => { const n={...s}; delete n[key]; return n; }); }
  }

  return (
    <div>
      <SectionTitle>交通費設定（スタッフ × 物件）</SectionTitle>
      <p className="text-xs text-gray-500 mb-4">各スタッフの物件別交通費（固定額）を設定してください</p>
      {activeStaff.map(s => (
        <Card key={s.id} className="p-4 mb-3">
          <p className="font-medium text-gray-800 mb-3">{s.name}</p>
          <div className="space-y-2">
            {sortedProps.map(p => {
              const key = `${s.id}-${p.id}`;
              return (
                <div key={p.id} className="flex items-center justify-between gap-3">
                  <span className="text-sm text-gray-600 w-16">{p.name}</span>
                  <div className="relative flex-1 max-w-[160px]">
                    <span className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm">¥</span>
                    <input type="number" min="0" defaultValue={getFee(s.id, p.id)}
                      className="w-full border border-gray-300 rounded-lg pl-7 pr-3 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-primary"
                      onBlur={e => setFee(s.id, p.id, Number(e.target.value)||0)} />
                  </div>
                  {saving[key] && <span className="text-xs text-primary">保存中</span>}
                </div>
              );
            })}
          </div>
        </Card>
      ))}
    </div>
  );
}

function RecurringExpensesSettings() {
  const { data: properties } = useData('properties', '*');
  const [items, setItems] = useState([]);
  const [loading, setLoading] = useState(true);
  const [saving, setSaving] = useState({});
  const [showAdd, setShowAdd] = useState(false);
  const [form, setForm] = useState({ property_id:'', category:'家賃', amount:0 });
  const [adding, setAdding] = useState(false);
  const [msg, setMsg] = useState('');

  async function load() {
    setLoading(true);
    const { data } = await getSupabase().from('recurring_expenses').select('*').order('created_at');
    setItems(data || []);
    setLoading(false);
  }
  useEffect(() => { load(); }, []);

  const propName = id => properties.find(p => p.id === id)?.name || '?';

  async function saveAmount(id, amount) {
    setSaving(s => ({...s, [id]: true}));
    await getSupabase().from('recurring_expenses').update({ amount }).eq('id', id);
    setItems(prev => prev.map(i => i.id === id ? {...i, amount} : i));
    setSaving(s => { const n={...s}; delete n[id]; return n; });
  }

  async function toggleActive(id, active) {
    await getSupabase().from('recurring_expenses').update({ active }).eq('id', id);
    setItems(prev => prev.map(i => i.id === id ? {...i, active} : i));
  }

  async function deleteItem(id) {
    if (!confirm('削除しますか？')) return;
    await getSupabase().from('recurring_expenses').delete().eq('id', id);
    setItems(prev => prev.filter(i => i.id !== id));
  }

  async function addItem() {
    if (!form.property_id || !form.category || !form.amount) { setMsg('物件・カテゴリ・金額を入力してください'); return; }
    setAdding(true); setMsg('');
    try {
      const { data, error } = await getSupabase().from('recurring_expenses').insert({ ...form, amount: Number(form.amount) }).select().single();
      if (error) { setMsg('❌ ' + error.message); return; }
      setItems(prev => [...prev, data]);
      setForm({ property_id:'', category:'家賃', amount:0 });
      setShowAdd(false);
    } finally { setAdding(false); }
  }

  const sortedProps = [...properties].sort((a,b)=>a.sort_order-b.sort_order);

  return (
    <div className="space-y-4">
      <SectionTitle>定期固定費テンプレート</SectionTitle>
      <p className="text-xs text-gray-500 -mt-2">毎月の家賃・ゴミ・Wi-Fiなどの定額費用を登録。収支入力の「定期費用を自動入力」ボタンで一括入力できます。</p>
      {loading ? <Spinner /> : (
        <div className="space-y-2">
          {items.map(item => (
            <Card key={item.id} className={`p-3 ${!item.active ? 'opacity-60' : ''}`}>
              <div className="flex items-center gap-2">
                <div className="flex-1 min-w-0">
                  <p className="text-sm font-medium text-gray-800">{propName(item.property_id)}｜{item.category}</p>
                </div>
                <div className="w-28 flex-shrink-0">
                  <AmountInput value={item.amount} onChange={v => saveAmount(item.id, v)} />
                </div>
                <button onClick={() => toggleActive(item.id, !item.active)}
                  className={`text-xs px-2 py-1 rounded border flex-shrink-0 ${item.active ? 'text-green-600 border-green-200 bg-green-50' : 'text-gray-400 border-gray-200'}`}>
                  {item.active ? 'ON' : 'OFF'}
                </button>
                <button onClick={() => deleteItem(item.id)} className="text-xs text-red-400 flex-shrink-0">×</button>
                {saving[item.id] && <span className="text-xs text-primary">保存</span>}

            </Card>
          ))}
          {items.length === 0 && <p className="text-sm text-gray-400 text-center py-4">登録された定期費用がありません</p>}

      {msg && <p className="text-sm">{msg}</p>}

        <Card className="p-4 space-y-3">
          <p className="text-sm font-medium text-gray-700">新規追加</p>
          <div className="flex gap-2 flex-wrap">
            {sortedProps.map(p => (

                className={`px-3 py-1.5 rounded-lg text-sm border ${form.property_id===p.id?'bg-primary text-white border-primary':'border-gray-300 text-gray-600'}`}>
                {p.name}
              </button>

          </div>
          <div className="flex gap-2 flex-wrap">
            {FIXED_EXPENSE_CATEGORIES.map(c => (
              <button key={c} onClick={() => setForm(f=>({...f, category:c}))}
                className={`px-3 py-1.5 rounded-lg text-sm border ${form.category===c?'bg-primary text-white border-primary':'border-gray-300 text-gray-600'}`}>
                {c}
              </button>
            ))}
          </div>
          <AmountInput value={form.amount} onChange={v => setForm(f=>({...f, amount:v}))} />
          <div className="flex gap-2">
            <button onClick={addItem} disabled={adding} className="flex-1 bg-primary text-white rounded-lg py-2.5 font-medium disabled:opacity-50">
              {adding ? '追加中...' : '追加'}
            </button>
            <button onClick={() => setShowAdd(false)} className="px-4 py-2 text-gray-500 border border-gray-300 rounded-lg">キャンセル</button>
          </div>

      ) : (
        <button onClick={() => setShowAdd(true)} className="w-full border-2 border-dashed border-gray-200 rounded-xl py-3 text-sm text-gray-400 hover:border-primary/40 hover:text-primary transition-colors">

  );

function SystemSettings() {
  const [seeding, setSeeding] = useState(false);
  const [seedMsg, setSeedMsg] = useState('');
  const [seedingShifts, setSeedingShifts] = useState(false);
  const [shiftMsg, setShiftMsg] = useState('');

  async function handleLogout() {
    await getSupabase().auth.signOut();
    window.location.reload();
  }
  function handleResetConfig() {
    if (confirm('Supabase設定をリセットしますか？再ログインが必要になります。')) {
      localStorage.removeItem(CONFIG_KEY);
      supabaseClient = null;
      window.location.reload();
    }
  }

  async function seedStaff() {
    if (!confirm('スタッフ初期データを登録します。既存データは上書きされません。続けますか？')) return;
    setSeeding(true); setSeedMsg('');
    try {
      const sb = getSupabase();
      // スタッフ追加
      const newStaff = [
        { name:'ゆうじ', type:'external', active:true },
        { name:'みゃく', type:'external', active:true },
        { name:'ちゃん', type:'external', active:true },
        { name:'ゆきこ', type:'external', active:true },
        { name:'もんもん', type:'external', active:true },
      ];
      for (const s of newStaff) {
        const { data: existing } = await sb.from('staff').select('id').eq('name', s.name).maybeSingle();
        if (!existing) await sb.from('staff').insert(s);
      }
      // 全スタッフと物件を取得
      const { data: allStaff } = await sb.from('staff').select('*');
      const { data: allProps } = await sb.from('properties').select('*');
      const findS = n => allStaff?.find(s => s.name === n);
      const findP = n => allProps?.find(p => p.name === n);
      // 交通費テーブル（往復）
      const fees = [
        ['ゆうじ','橘',1100],['ゆうじ','山王',960],['ゆうじ','玉津',600],
        ['みゃく','橘',880],['みゃく','山王',480],['みゃく','玉津',480],
        ['ちゃん','橘',1200],['ちゃん','山王',820],['ちゃん','玉津',980],
        ['ゆきこ','橘',980],['ゆきこ','山王',880],['ゆきこ','玉津',980],
        ['りょうこ','橘',580],['りょうこ','山王',480],['りょうこ','玉津',400],
        ['かわけん','山王',480],['かわけん','玉津',580],
      ];
      for (const [sName, pName, amount] of fees) {
        const s = findS(sName); const p = findP(pName);
        if (!s || !p) continue;
        const { data: ex } = await sb.from('staff_transport_fees').select('id').eq('staff_id', s.id).eq('property_id', p.id).maybeSingle();
        if (ex) {
          await sb.from('staff_transport_fees').update({ amount }).eq('id', ex.id);
        } else {
          await sb.from('staff_transport_fees').insert({ staff_id: s.id, property_id: p.id, amount });
        }
      }
      setSeedMsg('✅ 登録完了！スタッフと交通費を設定しました。');
    } catch(e) {
      setSeedMsg('❌ エラー: ' + e.message);
    } finally { setSeeding(false); }
  }

  async function syncMonthShifts(year, month, shiftList) {
    const sb = getSupabase();
    const [{ data: allStaff }, { data: allProps }, { data: allTransport }] = await Promise.all([
      sb.from('staff').select('*'),
      sb.from('properties').select('*'),
      sb.from('staff_transport_fees').select('*'),
    ]);
    const pad = n => String(n).padStart(2,'0');
    const from = `${year}-${pad(month)}-01`;
    const to = `${year}-${pad(month)}-${pad(daysInMonth(year,month))}`;

    // 既存シフトを取得
    const { data: existingShifts } = await sb.from('cleaning_shifts')
      .select('id, date, property_id').gte('date', from).lte('date', to);

    // 削除されたシフトを消す（タイムツリーになくなったもの）
    let deleted = 0;
    for (const ex of (existingShifts || [])) {
      const prop = allProps?.find(p => p.id === ex.property_id);
      const stillExists = shiftList.some(s => s.date === ex.date && s.prop === prop?.name);
      if (!stillExists) {
        await sb.from('cleaning_shift_staff').delete().eq('shift_id', ex.id);
        await sb.from('cleaning_shifts').delete().eq('id', ex.id);
        deleted++;
      }
    }

    // 新しいシフトを追加
    let added = 0, staffCount = 0;
    for (const sh of shiftList) {
      const prop = allProps?.find(p => p.name === sh.prop);
      if (!prop) continue;
      const already = (existingShifts || []).find(e => e.date === sh.date && e.property_id === prop.id);
      if (already) continue; // 既存はスキップ
      const { data: newShift, error } = await sb.from('cleaning_shifts')
        .insert({ property_id: prop.id, date: sh.date, status: 'completed' }).select().single();
      if (error || !newShift) continue;
      added++;
      const fee = sh.staff.length >= 2 ? 6000 : 8000;
      for (const sName of sh.staff) {
        const staffRec = allStaff?.find(s => s.name === sName);
        if (!staffRec) continue;
        const isKawakenTachi = staffRec.type === 'kawaken' && sh.prop === '橘';
        const cleaningFee = isKawakenTachi ? 0 : fee;
        const transport = allTransport?.find(t => t.staff_id === staffRec.id && t.property_id === prop.id)?.amount || 0;
        await sb.from('cleaning_shift_staff').insert({
          shift_id: newShift.id, staff_id: staffRec.id,
          cleaning_fee: cleaningFee, transport_fee: transport, total_fee: cleaningFee + transport
        });
        staffCount++;
      }
    }
    return { added, deleted, staffCount };
  }

  async function seedJuneShifts() {
    if (!confirm('2026年6月のシフトをタイムツリーと同期します。\n追加：新規シフト登録\n削除：キャンセル済みシフトを削除\n\n続けますか？')) return;
    setSeedingShifts(true); setShiftMsg('');
    try {
      const { added, deleted, staffCount } = await syncMonthShifts(2026, 6, JUNE_SHIFTS_2026);
      setShiftMsg(`✅ 追加 ${added}件・削除 ${deleted}件（スタッフ ${staffCount}名分）`);
    } catch(e) { setShiftMsg('❌ ' + e.message); }
    finally { setSeedingShifts(false); }
  }

  return (
    <div className="space-y-3">
      <SectionTitle>システム設定</SectionTitle>
      <Card className="p-4">
        <p className="text-sm font-medium text-gray-700 mb-1">6月シフト一括登録（タイムツリーより）</p>
        <p className="text-xs text-gray-500 mb-2">2026年6月のタイムツリーシフトをアプリに登録します。既存シフトはスキップされます。</p>
        <div className="bg-gray-50 rounded-lg p-2 mb-3 text-xs text-gray-500 space-y-0.5 max-h-32 overflow-y-auto">
          {JUNE_SHIFTS_2026.map((sh,i) => (
            <div key={i}>{sh.date.slice(5)} {sh.prop}：{sh.staff.join('・')}</div>
          ))}
        </div>
        {shiftMsg && <p className="text-sm mb-2">{shiftMsg}</p>}
        <button onClick={seedJuneShifts} disabled={seedingShifts}
          className="text-sm text-primary border border-primary/30 bg-primary/5 px-4 py-2 rounded-lg disabled:opacity-50">
          {seedingShifts ? '登録中...' : '📅 6月シフトを一括登録'}
        </button>
      </Card>
      <Card className="p-4">
        <p className="text-sm font-medium text-gray-700 mb-1">スタッフ初期設定</p>
        <p className="text-xs text-gray-500 mb-3">ゆうじ・みゃく・ちゃん・ゆきこ・もんもんと各交通費を一括登録します</p>
        {seedMsg && <p className="text-sm mb-3">{seedMsg}</p>}
        <button onClick={seedStaff} disabled={seeding}
          className="text-sm text-green-700 border border-green-300 bg-green-50 px-4 py-2 rounded-lg disabled:opacity-50">
          {seeding ? '登録中...' : '🚀 スタッフ一括登録'}
        </button>
      </Card>
      <Card className="p-4">
        <p className="text-sm font-medium text-gray-700 mb-1">Supabase接続</p>
        <p className="text-xs text-gray-500 mb-3">接続済み</p>
        <button onClick={handleResetConfig} className="text-sm text-orange-600 border border-orange-200 px-4 py-2 rounded-lg">設定をリセット</button>
      </Card>
      <Card className="p-4">
        <p className="text-sm font-medium text-gray-700 mb-3">ログアウト</p>
        <button onClick={handleLogout} className="text-sm text-red-600 border border-red-200 px-4 py-2 rounded-lg">ログアウト</button>
      </Card>
    </div>
  );
}

function ShiftsPage() {
  const { data: properties } = useData('properties', '*');
  const { data: staff } = useData('staff', '*');
  const [viewMode, setViewMode] = useState('list'); // 'calendar' | 'list'
  const [selYear, setSelYear] = useState(today().year);
  const [selMonth, setSelMonth] = useState(today().month);
  const [shifts, setShifts] = useState([]);
  const [shiftStaff, setShiftStaff] = useState([]);
  const [loading, setLoading] = useState(true);
  const [showAdd, setShowAdd] = useState(false);
  const [showBulk, setShowBulk] = useState(false);
  const [filterProp, setFilterProp] = useState('all');
  const [filterStaff, setFilterStaff] = useState('all');
  const [editShift, setEditShift] = useState(null);

  const sortedProps = useMemo(() => [...properties].sort((a,b)=>a.sort_order-b.sort_order), [properties]);
  const activeStaff = useMemo(() => staff.filter(s=>s.active), [staff]);

  async function loadShifts() {
    setLoading(true);
    try {
      const sb = getSupabase();
      const from = isoDate(selYear, selMonth, 1);
      const to = isoDate(selYear, selMonth, daysInMonth(selYear, selMonth));
      const { data: rows } = await sb.from('cleaning_shifts').select('*').gte('date', from).lte('date', to).order('date');
      const ids = (rows||[]).map(r=>r.id);
      let staffRows = [];
      if (ids.length > 0) {
        const { data: sr } = await sb.from('cleaning_shift_staff').select('*').in('shift_id', ids);
        staffRows = sr || [];
      }
      setShifts(rows || []);
      setShiftStaff(staffRows);
    } finally { setLoading(false); }
  }

  useEffect(() => { loadShifts(); }, [selYear, selMonth]);

  const enrichedShifts = useMemo(() => {
    return shifts.map(sh => {
      const prop = properties.find(p => p.id === sh.property_id);
      const staffList = shiftStaff.filter(ss => ss.shift_id === sh.id).map(ss => {
        const s = staff.find(x => x.id === ss.staff_id);
        return { ...ss, staffName: s?.name || '不明', staffType: s?.type };
      });
      return { ...sh, prop, staffList };
    });
  }, [shifts, shiftStaff, properties, staff]);

  const filteredShifts = useMemo(() => {
    return enrichedShifts.filter(sh => {
      if (filterProp !== 'all' && sh.property_id !== filterProp) return false;
      if (filterStaff !== 'all' && !sh.staffList.some(x => x.staff_id === filterStaff)) return false;
      return true;
    });
  }, [enrichedShifts, filterProp, filterStaff]);

  const propColor = (name) => ({ '山王':'sanno', '玉津':'tamatsu', '橘':'tachibana' }[name] || 'gray');

  async function completeShift(sh) {
    if (!confirm(`「${sh.prop?.name} ${sh.date}」を完了にしますか？\n費用が自動計算されます。`)) return;
    const sb = getSupabase();
    const { data: tFees } = await sb.from('staff_transport_fees').select('*');
    const numStaff = sh.staffList.length;
    const cleaningFee = numStaff === 1 ? CLEANING_RATE_ONE : CLEANING_RATE_TWO;

    for (const ss of sh.staffList) {
      const tf = (tFees||[]).find(x => x.staff_id === ss.staff_id && x.property_id === sh.property_id);
      const transport = tf ? tf.amount : 0;
      // かわけんは橘の清掃費なし（橘はかわけん単独負担のため）
      const isKawakenAtTachibana = ss.staffType === 'kawaken' && sh.prop?.name === '橘';
      const fee = isKawakenAtTachibana ? 0 : cleaningFee;
      const total = fee + transport;
      await sb.from('cleaning_shift_staff').update({
        cleaning_fee: fee, transport_fee: transport, total_fee: total
      }).eq('id', ss.id);
    }
    await sb.from('cleaning_shifts').update({ status: 'completed' }).eq('id', sh.id);
    loadShifts();
  }

  async function deleteShift(sh) {
    if (!confirm('このシフトを削除しますか？')) return;
    await getSupabase().from('cleaning_shifts').delete().eq('id', sh.id);
    loadShifts();
  }

  return (
    <div className="pb-24">
      <div className="bg-white border-b border-gray-200 px-4 py-3 sticky top-0 z-10">
        <div className="flex items-center justify-between mb-3">
          <MonthPicker year={selYear} month={selMonth} onChange={(y,m)=>{setSelYear(y);setSelMonth(m);}} />
          <div className="flex gap-1">
            <button onClick={() => setViewMode('list')} className={`px-3 py-1.5 rounded-lg text-xs font-medium ${viewMode==='list'?'bg-primary text-white':'bg-gray-100 text-gray-600'}`}>リスト</button>
            <button onClick={() => setViewMode('calendar')} className={`px-3 py-1.5 rounded-lg text-xs font-medium ${viewMode==='calendar'?'bg-primary text-white':'bg-gray-100 text-gray-600'}`}>カレンダー</button>
          </div>
        </div>
        <div className="flex gap-2 overflow-x-auto pb-1">
          <select value={filterProp} onChange={e=>setFilterProp(e.target.value)}
            className="text-xs border border-gray-200 rounded-lg px-2 py-1.5 bg-white">
            <option value="all">全物件</option>
            {sortedProps.map(p => <option key={p.id} value={p.id}>{p.name}</option>)}
          </select>
          <select value={filterStaff} onChange={e=>setFilterStaff(e.target.value)}
            className="text-xs border border-gray-200 rounded-lg px-2 py-1.5 bg-white">
            <option value="all">全スタッフ</option>
            {activeStaff.map(s => <option key={s.id} value={s.id}>{s.name}</option>)}
          </select>
        </div>
      </div>

      <div className="p-4">
        {loading ? <Spinner /> : (
          viewMode === 'calendar'
            ? <ShiftCalendar year={selYear} month={selMonth} shifts={filteredShifts} properties={sortedProps} />
            : <ShiftList shifts={filteredShifts} onComplete={completeShift} onDelete={deleteShift} onEdit={sh=>{setEditShift(sh);setShowAdd(true);}} propColor={propColor} />
        )}
      </div>

      <div className="fixed bottom-20 right-4 flex flex-col gap-2">
        <button onClick={() => { setEditShift(null); setShowAdd(true); }}
          className="bg-primary text-white w-14 h-14 rounded-full shadow-lg flex items-center justify-center text-2xl hover:bg-primary-dark">+</button>
        <button onClick={() => setShowBulk(true)}
          className="bg-accent text-white w-12 h-12 rounded-full shadow-md flex items-center justify-center text-lg hover:bg-accent-dark self-end" title="一括登録">≡</button>
      </div>

      {showAdd && (
        <ShiftForm
          properties={sortedProps} staff={activeStaff} editShift={editShift}
          year={selYear} month={selMonth}
          onClose={() => { setShowAdd(false); setEditShift(null); }}
          onSaved={loadShifts}
        />
      )}
      {showBulk && (
        <BulkShiftForm
          properties={sortedProps} staff={activeStaff} year={selYear} month={selMonth}
          onClose={() => setShowBulk(false)} onSaved={loadShifts}
        />
      )}
    </div>
  );
}

function ShiftCalendar({ year, month, shifts, properties }) {
  const days = daysInMonth(year, month);
  const firstDow = dayOfWeek(year, month, 1);
  const cells = [...Array(firstDow).fill(null), ...Array.from({length:days},(_,i)=>i+1)];
  const weekDays = ['日','月','火','水','木','金','土'];
  const propColors = { '山王':'prop-sanno', '玉津':'prop-tamatsu', '橘':'prop-tachibana' };

  function getShiftsForDay(d) {
    if (!d) return [];
    const dateStr = isoDate(year, month, d);
    return shifts.filter(sh => sh.date === dateStr);
  }

  return (
    <div>
      <div className="grid grid-cols-7 mb-1">
        {weekDays.map((d,i) => (
          <div key={i} className={`text-center text-xs font-medium py-1 ${i===0?'text-red-500':i===6?'text-primary':'text-gray-400'}`}>{d}</div>
        ))}
      </div>
      <div className="grid grid-cols-7 gap-0.5">
        {cells.map((d, i) => {
          const dow = i % 7;
          const dayShifts = getShiftsForDay(d);
          return (
            <div key={i} className={`min-h-[56px] rounded-lg p-1 ${d ? 'bg-white border border-gray-100' : ''}`}>
              {d && (
                <>
                  <p className={`text-xs font-medium mb-0.5 ${dow===0?'text-red-500':dow===6?'text-primary':'text-gray-700'}`}>{d}</p>
                  {dayShifts.map(sh => (
                    <div key={sh.id} className={`text-xs px-1 py-0.5 rounded mb-0.5 truncate ${propColors[sh.prop?.name]||'bg-gray-100 text-gray-600'}`}>
                      {sh.prop?.name}
                      {sh.status==='completed' && ' ✓'}
                    </div>
                  ))}
                </>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

function ShiftForm({ properties, staff, editShift, year, month, onClose, onSaved }) {
  const [date, setDate] = useState(editShift?.date || isoDate(year, month, 1));
  const [propId, setPropId] = useState(editShift?.property_id || (properties[0]?.id||''));
  const [selStaff, setSelStaff] = useState([]);
  const [notes, setNotes] = useState(editShift?.notes || '');
  const [saving, setSaving] = useState(false);
  const [err, setErr] = useState('');

  const sortedProps = useMemo(() => [...properties].sort((a,b)=>a.sort_order-b.sort_order), [properties]);

  useEffect(() => {
    if (editShift) {
      // Pre-select staff if editing - would need to pass shiftStaff
      setDate(editShift.date);
      setPropId(editShift.property_id);
      setNotes(editShift.notes || '');
    }
  }, [editShift]);

  function toggleStaff(id) {
    setSelStaff(prev => prev.includes(id) ? prev.filter(x=>x!==id) : [...prev,id]);
  }

  async function save() {
    if (!date) { setErr('日付を選択してください'); return; }
    if (!propId) { setErr('物件を選択してください'); return; }
    if (selStaff.length === 0) { setErr('スタッフを1人以上選択してください'); return; }
    setSaving(true); setErr('');
    try {
      const sb = getSupabase();
      let shiftId;
      if (editShift) {
        await sb.from('cleaning_shifts').update({ date, property_id: propId, notes, status:'scheduled' }).eq('id', editShift.id);
        await sb.from('cleaning_shift_staff').delete().eq('shift_id', editShift.id);
        shiftId = editShift.id;
      } else {
        const { data } = await sb.from('cleaning_shifts').insert({ date, property_id: propId, notes, status:'scheduled' }).select().single();
        shiftId = data.id;
      }
      await sb.from('cleaning_shift_staff').insert(selStaff.map(sid => ({ shift_id: shiftId, staff_id: sid })));
      onSaved(); onClose();
    } catch(e) { setErr(e.message); }
    finally { setSaving(false); }
  }

  return (
    <Modal show={true} onClose={onClose} title={editShift ? 'シフト編集' : 'シフト追加'}>
      <div className="space-y-4">
        <div>
          <label className="block text-sm font-medium text-gray-700 mb-1">日付</label>
          <input type="date" value={date} onChange={e=>setDate(e.target.value)}
            className="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary" />
        </div>
        <div>
          <label className="block text-sm font-medium text-gray-700 mb-1">物件</label>
          <div className="flex gap-2 flex-wrap">
            {sortedProps.map(p => (
              <button key={p.id} onClick={() => setPropId(p.id)}
                className={`px-4 py-2 rounded-lg text-sm border font-medium transition-colors ${propId===p.id?'bg-primary text-white border-primary':'border-gray-300 text-gray-600'}`}>
                {p.name}
              </button>
            ))}
          </div>
        </div>
        <div>
          <label className="block text-sm font-medium text-gray-700 mb-1">担当スタッフ（複数可）</label>
          <div className="flex gap-2 flex-wrap">
            {staff.map(s => (
              <button key={s.id} onClick={() => toggleStaff(s.id)}
                className={`px-3 py-1.5 rounded-lg text-sm border transition-colors ${selStaff.includes(s.id)?'bg-primary text-white border-primary':'border-gray-300 text-gray-600'}`}>
                {s.name}
              </button>
            ))}
          </div>
          {selStaff.length > 0 && (
            <p className="text-xs text-gray-500 mt-1">
              {selStaff.length}名体制 → 清掃料金 {fmt(selStaff.length===1?CLEANING_RATE_ONE:CLEANING_RATE_TWO)}/人
            </p>
          )}
        </div>
        <div>
          <label className="block text-sm font-medium text-gray-700 mb-1">メモ（任意）</label>
          <input className="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary"
            value={notes} onChange={e=>setNotes(e.target.value)} placeholder="備考など" />
        </div>
        {err && <p className="text-red-500 text-sm">{err}</p>}
        <button onClick={save} disabled={saving}
          className="w-full bg-primary text-white rounded-lg py-3 font-medium disabled:opacity-50">
          {saving ? '保存中...' : '保存'}
        </button>
      </div>
    </Modal>
  );
}

function BulkShiftForm({ properties, staff, year, month, onClose, onSaved }) {
  const [propId, setPropId] = useState(properties[0]?.id||'');
  const [entries, setEntries] = useState([{ date:'', staffIds:[] }]);
  const [saving, setSaving] = useState(false);
  const [err, setErr] = useState('');

  const sortedProps = useMemo(() => [...properties].sort((a,b)=>a.sort_order-b.sort_order), [properties]);

  function addEntry() { setEntries(e => [...e, { date:'', staffIds:[] }]); }
  function removeEntry(i) { setEntries(e => e.filter((_,j)=>j!==i)); }
  function updateEntry(i, field, val) { setEntries(e => { const n=[...e]; n[i]={...n[i],[field]:val}; return n; }); }
  function toggleEntryStaff(i, sid) {
    setEntries(e => {
      const n=[...e];
      const ids = n[i].staffIds;
      n[i]={...n[i], staffIds: ids.includes(sid)?ids.filter(x=>x!==sid):[...ids,sid]};
      return n;
    });
  }

  async function save() {
    const valid = entries.filter(e => e.date && e.staffIds.length > 0);
    if (valid.length === 0) { setErr('有効なシフトを1件以上入力してください'); return; }
    setSaving(true); setErr('');
    try {
      const sb = getSupabase();
      for (const entry of valid) {
        const { data } = await sb.from('cleaning_shifts').insert({
          date: entry.date, property_id: propId, status: 'scheduled'
        }).select().single();
        await sb.from('cleaning_shift_staff').insert(entry.staffIds.map(sid => ({
          shift_id: data.id, staff_id: sid
        })));
      }
      onSaved(); onClose();
    } catch(e) { setErr(e.message); }
    finally { setSaving(false); }
  }

  return (
    <Modal show={true} onClose={onClose} title={`${year}年${month}月 一括シフト登録`}>
      <div className="space-y-4">
        <div>
          <label className="block text-sm font-medium text-gray-700 mb-1">物件（共通）</label>
          <div className="flex gap-2 flex-wrap">
            {sortedProps.map(p => (
              <button key={p.id} onClick={() => setPropId(p.id)}
                className={`px-3 py-1.5 rounded-lg text-sm border ${propId===p.id?'bg-primary text-white border-primary':'border-gray-300 text-gray-600'}`}>
                {p.name}
              </button>
            ))}
          </div>
        </div>
        <div className="space-y-3 max-h-[50vh] overflow-y-auto">
          {entries.map((entry, i) => (
            <div key={i} className="border border-gray-200 rounded-xl p-3">
              <div className="flex items-center justify-between mb-2">
                <span className="text-xs font-medium text-gray-500">シフト {i+1}</span>
                {entries.length > 1 && (
                  <button onClick={() => removeEntry(i)} className="text-red-400 text-xs">削除</button>
                )}
              </div>
              <input type="date" value={entry.date} onChange={e=>updateEntry(i,'date',e.target.value)}
                className="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm mb-2 focus:outline-none focus:ring-2 focus:ring-primary" />
              <div className="flex flex-wrap gap-1.5">
                {staff.map(s => (
                  <button key={s.id} onClick={() => toggleEntryStaff(i, s.id)}
                    className={`px-2.5 py-1 rounded-lg text-xs border ${entry.staffIds.includes(s.id)?'bg-primary text-white border-primary':'border-gray-300 text-gray-600'}`}>
                    {s.name}
                  </button>
                ))}
              </div>
            </div>
          ))}
        </div>
        <button onClick={addEntry} className="w-full border-2 border-dashed border-gray-300 text-gray-500 py-2 rounded-xl text-sm">
          + シフトを追加
        </button>
        {err && <p className="text-red-500 text-sm">{err}</p>}
        <button onClick={save} disabled={saving}
          className="w-full bg-primary text-white rounded-lg py-3 font-medium disabled:opacity-50">
          {saving ? '登録中...' : `${entries.filter(e=>e.date&&e.staffIds.length>0).length}件を一括登録`}
        </button>
      </div>
    </Modal>
  );
}

function RevenueSection({ year, month }) {
  const { data: properties } = useData('properties', '*');
  const [revenues, setRevenues] = useState({});
  const [saving, setSaving] = useState({});

  const sortedProps = useMemo(() => [...properties].sort((a,b)=>a.sort_order-b.sort_order), [properties]);

  useEffect(() => {
    async function load() {
      const sb = getSupabase();
      const { data } = await sb.from('monthly_revenue').select('*').eq('year', year).eq('month', month);
      const map = {};
      (data||[]).forEach(r => { map[r.property_id] = r.amount; });
      setRevenues(map);
    }
    if (properties.length) load();
  }, [year, month, properties]);

  async function saveRevenue(propId, amount) {
    setSaving(s => ({...s, [propId]: true}));
    try {
      const sb = getSupabase();
      const { data: existing } = await sb.from('monthly_revenue').select('id').eq('property_id', propId).eq('year', year).eq('month', month).single();
      if (existing) {
        await sb.from('monthly_revenue').update({ amount }).eq('id', existing.id);
      } else {
        await sb.from('monthly_revenue').insert({ property_id: propId, year, month, amount });
      }
      setRevenues(r => ({...r, [propId]: amount}));
    } finally { setSaving(s => { const n={...s}; delete n[propId]; return n; }); }
  }

  const ownerLabel = { kawaken:'かわけん受取', ryoko:'りょうこ受取' };

  return (
    <div>
      <SectionTitle>売上入力</SectionTitle>
      <div className="space-y-3">
        {sortedProps.map(p => (
          <Card key={p.id} className="p-4">
            <div className="flex items-start justify-between mb-2">
              <div>
                <p className="font-medium text-gray-800">{p.name}</p>
                <p className="text-xs text-gray-500">{ownerLabel[p.revenue_owner]}</p>
              </div>
              {saving[p.id] && <span className="text-xs text-primary">保存中...</span>}
            </div>
            <AmountInput
              value={revenues[p.id]||0}
              onChange={amount => {
                setRevenues(r => ({...r, [p.id]: amount}));
                saveRevenue(p.id, amount);
              }}
            />
          </Card>
        ))}
      </div>
    </div>
  );
}

function FixedExpenseSection({ year, month }) {
  const { data: properties } = useData('properties', '*');
  const [expenses, setExpenses] = useState({});
  const [saving, setSaving] = useState({});
  const [applying, setApplying] = useState(false);

  const jointProps = useMemo(() => properties.filter(p => p.include_settlement).sort((a,b)=>a.sort_order-b.sort_order), [properties]);

  useEffect(() => {
    async function load() {
      const sb = getSupabase();
      const { data } = await sb.from('monthly_fixed_expenses').select('*').eq('year', year).eq('month', month);
      const map = {};
      (data||[]).forEach(r => {
        const k = `${r.property_id}-${r.category}`;
        map[k] = { id: r.id, amount: r.amount };
      });
      setExpenses(map);
    }
    if (properties.length) load();
  }, [year, month, properties]);

  async function saveExpense(propId, category, amount) {
    const k = `${propId}-${category}`;
    setSaving(s => ({...s, [k]: true}));
    try {
      const sb = getSupabase();
      const existing = expenses[k];
      if (existing?.id) {
        await sb.from('monthly_fixed_expenses').update({ amount }).eq('id', existing.id);
      } else {
        const { data } = await sb.from('monthly_fixed_expenses').insert({ property_id: propId, year, month, category, amount, payer:'kawaken' }).select().single();
        setExpenses(e => ({...e, [k]: { id: data.id, amount }}));
      }
      setExpenses(e => ({...e, [k]: {...(e[k]||{}), amount}}));
    } finally { setSaving(s => { const n={...s}; delete n[k]; return n; }); }
  }

  function getAmount(propId, cat) {
    return expenses[`${propId}-${cat}`]?.amount || 0;
  }

  async function applyRecurring() {
    setApplying(true);
    try {
      const sb = getSupabase();
      const { data: recurring } = await sb.from('recurring_expenses').select('*').eq('active', true);
      for (const r of (recurring || [])) {
        const k = `${r.property_id}-${r.category}`;
        if (!expenses[k]?.id) {
          await saveExpense(r.property_id, r.category, r.amount);
        }
      }
    } finally { setApplying(false); }
  }

  return (
    <div>
      <div className="flex items-center justify-between mb-4">
        <h2 className="text-base font-bold text-gray-700">固定費入力（かわけん立替）</h2>
        <button onClick={applyRecurring} disabled={applying}
          className="text-xs text-primary border border-primary/30 bg-primary/5 px-3 py-1.5 rounded-lg disabled:opacity-50 flex-shrink-0">
          {applying ? '入力中...' : '📋 定期費用を自動入力'}
        </button>
      </div>
      <div className="space-y-4">
        {jointProps.map(p => (
          <Card key={p.id} className="p-4">
            <p className="font-bold text-gray-800 mb-3">{p.name}</p>
            <div className="space-y-3">
              {FIXED_EXPENSE_CATEGORIES.map(cat => (
                <div key={cat} className="flex items-center gap-3">
                  <span className="text-sm text-gray-600 w-20 flex-shrink-0">{cat}</span>
                  <div className="flex-1">
                    <AmountInput
                      value={getAmount(p.id, cat)}
                      onChange={amount => {
                        const k = `${p.id}-${cat}`;
                        setExpenses(e => ({...e, [k]: {...(e[k]||{}), amount}}));
                        saveExpense(p.id, cat, amount);
                      }}

function VariableExpenseSection({ year, month }) {
  const { data: properties } = useData('properties', '*');
  const [items, setItems] = useState([]);
  const [loading, setLoading] = useState(true);
  const [showForm, setShowForm] = useState(false);
  const [form, setForm] = useState({ property_id:'', category:'消耗品', amount:0, payer:'kawaken', memo:'' });
  const [saving, setSaving] = useState(false);

  const sortedProps = useMemo(() => [...properties].sort((a,b)=>a.sort_order-b.sort_order), [properties]);

  const propOptions = useMemo(() => [
    ...sortedProps.map(p => ({ id: p.id, label: p.name, special: false })),
    { id: 'joint_sy', label: '山,玉 共通', special: true },
    { id: 'joint_all', label: '山,玉,橘 共通', special: true },
  ], [sortedProps]);

  // 按分プレビュー
  const splitPreview = useMemo(() => {
    if (!form.amount) return null;
    const sanno = sortedProps.find(p=>p.name==='山王');
    const tamatsu = sortedProps.find(p=>p.name==='玉津');
    const tachi = sortedProps.find(p=>p.name==='橘');
    if (form.property_id === 'joint_sy' && sanno && tamatsu) {
      const half = Math.floor(form.amount / 2);
      return [ { name:'山王', amt: form.amount - half }, { name:'玉津', amt: half } ];
    }
    if (form.property_id === 'joint_all' && sanno && tamatsu && tachi) {
      const third = Math.floor(form.amount / 3);
      return [ { name:'山王', amt: form.amount - third*2 }, { name:'玉津', amt: third }, { name:'橘', amt: third } ];
    }
    return null;
  }, [form.property_id, form.amount, sortedProps]);

  async function load() {
    setLoading(true);
    const { data } = await getSupabase().from('monthly_variable_expenses').select('*').eq('year', year).eq('month', month).order('created_at', {ascending:false});
    setItems(data||[]);
    setLoading(false);
  }

  useEffect(() => { if(properties.length) load(); }, [year, month, properties]);

  async function saveItem() {
    if (!form.property_id) { alert('物件を選択してください'); return; }
    if (!form.amount) { alert('金額を入力してください'); return; }
    setSaving(true);
    const sb = getSupabase();
    try {
      if (form.property_id === 'joint_sy') {
        const sanno = sortedProps.find(p=>p.name==='山王');
        const tamatsu = sortedProps.find(p=>p.name==='玉津');
        const half = Math.floor(form.amount / 2);
        const memoTag = form.memo ? `【山玉共通】${form.memo}` : '【山玉共通】';
        await sb.from('monthly_variable_expenses').insert([
          { property_id: sanno.id, category: form.category, amount: form.amount - half, payer: form.payer, memo: memoTag, year, month },
          { property_id: tamatsu.id, category: form.category, amount: half, payer: form.payer, memo: memoTag, year, month },
        ]);
      } else if (form.property_id === 'joint_all') {
        const sanno = sortedProps.find(p=>p.name==='山王');
        const tamatsu = sortedProps.find(p=>p.name==='玉津');
        const tachi = sortedProps.find(p=>p.name==='橘');
        const third = Math.floor(form.amount / 3);
        const memoTag = form.memo ? `【山玉橘共通】${form.memo}` : '【山玉橘共通】';
        await sb.from('monthly_variable_expenses').insert([
          { property_id: sanno.id, category: form.category, amount: form.amount - third*2, payer: form.payer, memo: memoTag, year, month },
          { property_id: tamatsu.id, category: form.category, amount: third, payer: form.payer, memo: memoTag, year, month },
          { property_id: tachi.id, category: form.category, amount: third, payer: form.payer, memo: memoTag, year, month },
        ]);
      } else {
        await sb.from('monthly_variable_expenses').insert({ ...form, year, month });
      }
      setShowForm(false);
      setForm({ property_id:'', category:'消耗品', amount:0, payer:'kawaken', memo:'' });
      load();
    } finally { setSaving(false); }
  }

  async function deleteItem(id) {
    if (!confirm('削除しますか？')) return;
    await getSupabase().from('monthly_variable_expenses').delete().eq('id', id);
    load();
  }

  const propName = (id) => properties.find(p=>p.id===id)?.name || '';

  return (
    <div>
      <div className="flex items-center justify-between mb-4">
        <SectionTitle>変動費</SectionTitle>
        <button onClick={() => { setForm({property_id:sortedProps[0]?.id||'', category:'消耗品', amount:0, payer:'kawaken', memo:''}); setShowForm(true); }}
          className="bg-primary text-white px-4 py-1.5 rounded-lg text-sm font-medium">+ 追加</button>
      </div>
      {loading ? <Spinner /> : (
        items.length === 0 ? (
          <div className="text-center py-8 text-gray-400"><p>変動費がありません</p></div>
        ) : (
          <div className="space-y-2">
            {items.map(item => (
              <Card key={item.id} className="p-3 flex items-start justify-between">
                <div>
                  <div className="flex items-center gap-2 mb-1 flex-wrap">
                    <Badge text={propName(item.property_id)} color="gray" />
                    <Badge text={item.category} color="blue" />
                    <Badge text={item.payer==='kawaken'?'かわけん':'りょうこ'} color={item.payer==='kawaken'?'blue':'purple'} />
                  </div>
                  <p className="font-bold text-gray-800">{fmt(item.amount)}</p>
                  {item.memo && <p className="text-xs text-gray-500">{item.memo}</p>}
                </div>
                <button onClick={() => deleteItem(item.id)} className="text-red-400 text-xs px-2 py-1 border border-red-100 rounded-lg">削除</button>
              </Card>
            ))}
            <div className="flex justify-between text-sm font-medium text-gray-600 px-1 pt-2">
              <span>かわけん計: <span className="text-primary">{fmt(items.filter(i=>i.payer==='kawaken').reduce((s,i)=>s+i.amount,0))}</span></span>
              <span>りょうこ計: <span className="text-[#FA8072]">{fmt(items.filter(i=>i.payer==='ryoko').reduce((s,i)=>s+i.amount,0))}</span></span>
            </div>
          </div>
        )
      )}
      <Modal show={showForm} onClose={() => setShowForm(false)} title="変動費追加">
        <div className="space-y-4">
          <div>
            <label className="block text-sm font-medium text-gray-700 mb-1">物件</label>
            <div className="flex gap-2 flex-wrap">
              {propOptions.map(p => (
                <button key={p.id} onClick={() => setForm(f=>({...f, property_id:p.id}))}
                  className={`px-3 py-1.5 rounded-lg text-sm border ${form.property_id===p.id?'bg-primary text-white border-primary':p.special?'border-orange-300 text-orange-600':'border-gray-300 text-gray-600'}`}>
                  {p.label}
                </button>
              ))}
            </div>
            {splitPreview && (
              <div className="mt-2 p-2 bg-orange-50 rounded-lg flex gap-3 text-xs text-orange-700">
                <span>按分：</span>
                {splitPreview.map(s => <span key={s.name}>{s.name} {fmt(s.amt)}</span>)}
              </div>
            )}
          </div>
          <div>
            <label className="block text-sm font-medium text-gray-700 mb-1">カテゴリ</label>
            <div className="flex flex-wrap gap-2">
              {VARIABLE_EXPENSE_CATEGORIES.map(c => (
                <button key={c} onClick={() => setForm(f=>({...f,category:c}))}
                  className={`px-3 py-1.5 rounded-lg text-sm border ${form.category===c?'bg-primary text-white border-primary':'border-gray-300 text-gray-600'}`}>
                  {c}
                </button>
              ))}
            </div>
          </div>
          <AmountInput label="金額" value={form.amount} onChange={amount => setForm(f=>({...f,amount}))} />
          <div>
            <label className="block text-sm font-medium text-gray-700 mb-1">支払者</label>
            <div className="flex gap-2">
              {[['kawaken','かわけん'],['ryoko','りょうこ']].map(([v,l]) => (
                <button key={v} onClick={() => setForm(f=>({...f,payer:v}))}
                  className={`flex-1 py-2 rounded-lg text-sm border ${form.payer===v?'bg-primary text-white border-primary':'border-gray-300 text-gray-600'}`}>
                  {l}
                </button>
              ))}
            </div>
          </div>
          <div>
            <label className="block text-sm font-medium text-gray-700 mb-1">メモ（任意）</label>
            <input className="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary"
              value={form.memo} onChange={e=>setForm(f=>({...f,memo:e.target.value}))} />
          </div>
          <button onClick={saveItem} disabled={saving}
            className="w-full bg-primary text-white rounded-lg py-3 font-medium disabled:opacity-50">
            {saving ? '保存中...' : '追加'}
          </button>
        </div>
      </Modal>
    </div>
  );
}

function CleaningExpenseSection({ year, month }) {
  const { data: properties } = useData('properties', '*');
  const { data: staffData } = useData('staff', '*');
  const [shifts, setShifts] = useState([]);
  const [shiftStaff, setShiftStaff] = useState([]);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    async function load() {
      setLoading(true);
      const sb = getSupabase();
      const from = isoDate(year, month, 1);
      const to = isoDate(year, month, daysInMonth(year, month));
      const { data: rows } = await sb.from('cleaning_shifts').select('*').gte('date', from).lte('date', to).eq('status', 'completed');
      const ids = (rows||[]).map(r=>r.id);
      let staffRows = [];
      if (ids.length > 0) {
        const { data: sr } = await sb.from('cleaning_shift_staff').select('*').in('shift_id', ids);
        staffRows = sr || [];
      }
      setShifts(rows||[]);
      setShiftStaff(staffRows);
      setLoading(false);
    }
    load();
  }, [year, month]);

  const summary = useMemo(() => {
    const byStaff = {};
    for (const ss of shiftStaff) {
      if (!byStaff[ss.staff_id]) byStaff[ss.staff_id] = { count:0, cleaning:0, transport:0 };
      byStaff[ss.staff_id].count++;
      byStaff[ss.staff_id].cleaning += ss.cleaning_fee||0;
      byStaff[ss.staff_id].transport += ss.transport_fee||0;
    }
    return byStaff;
  }, [shiftStaff]);

  return (
    <div>
      <SectionTitle>清掃費集計（完了分・自動計算）</SectionTitle>
      {loading ? <Spinner /> : (
        Object.keys(summary).length === 0 ? (
          <div className="text-center py-8 text-gray-400"><p>完了シフトがありません</p></div>
        ) : (
          <div className="space-y-2">
            {Object.entries(summary).map(([sid, data]) => {
              const s = staffData.find(x=>x.id===sid);
              return (
                <Card key={sid} className="p-4">
                  <div className="flex items-start justify-between">
                    <div>
                      <p className="font-medium text-gray-800">{s?.name||'不明'}</p>
                      <p className="text-xs text-gray-500 mt-0.5">清掃{data.count}回</p>
                    </div>
                    <div className="text-right">
                      <p className="font-bold text-gray-800">{fmt(data.cleaning + data.transport)}</p>
                      <p className="text-xs text-gray-500">清掃{fmt(data.cleaning)} + 交通費{fmt(data.transport)}</p>
                    </div>
                  </div>
                </Card>
              );
            })}
            <Card className="p-4 bg-cream-dark border-primary/20">
              <div className="flex justify-between font-bold">
                <span className="text-primary">合計支払額</span>
                <span className="text-primary">{fmt(shiftStaff.reduce((s,x)=>s+(x.total_fee||0),0))}</span>
              </div>
            </Card>
          </div>
        )
      )}
    </div>
  );
}

function PriorSettlementCard() {
  const [open, setOpen] = useState(false);
  const [detail, setDetail] = useState(null); // 'sanno' | 'tamatsu' | null
  const [seeding, setSeeding] = useState(false);
  const [seedMsg, setSeedMsg] = useState('');

  const initCost = 5054695;
  const fixedCost = 1147423;
  const revenue = 95836;
  const perPerson = Math.ceil((initCost + fixedCost - revenue) / 2);

  async function seedHistorical() {
    if (!confirm('2〜5月の実績データをDBに入力します。既存データは上書きされません。続けますか？')) return;
    setSeeding(true); setSeedMsg('');
    try {
      const sb = getSupabase();
      const { data: props } = await sb.from('properties').select('*');
      const sanno = props?.find(p=>p.name==='山王');
      const tamatsu = props?.find(p=>p.name==='玉津');
      const monthNums = { '2月':2, '3月':3, '4月':4, '5月':5 };
      const fixedCats = ['家賃','電気代','ガス代','水道代','Wi-Fi費','ゴミ回収費'];

      for (const [key, prop] of [['sanno', sanno], ['tamatsu', tamatsu]]) {
        if (!prop) continue;
        const pData = PRIOR_DATA[key];
        for (const row of pData.months) {
          const mn = monthNums[row.m];
          // Fixed expenses
          for (const cat of fixedCats) {
            const amount = row[cat] || 0;
            if (amount === 0) continue;
            const { data: ex } = await sb.from('monthly_fixed_expenses').select('id')
              .eq('property_id', prop.id).eq('year', 2026).eq('month', mn).eq('category', cat).maybeSingle();
            if (!ex) {
              await sb.from('monthly_fixed_expenses').insert({ property_id: prop.id, year:2026, month:mn, category:cat, amount, payer:'kawaken' });
            }
          }
          // 清掃費 as variable expense
          if ((row['清掃費']||0) > 0) {
            const { data: ex } = await sb.from('monthly_variable_expenses').select('id')
              .eq('property_id', prop.id).eq('year', 2026).eq('month', mn).eq('category', '清掃費').maybeSingle();
            if (!ex) {
              await sb.from('monthly_variable_expenses').insert({ property_id: prop.id, year:2026, month:mn, category:'清掃費', amount:row['清掃費'], payer:'kawaken', memo:'前期実績' });
            }
          }
          // Revenue
          if ((row['売上']||0) > 0) {
            const { data: ex } = await sb.from('monthly_revenue').select('id')
              .eq('property_id', prop.id).eq('year', 2026).eq('month', mn).maybeSingle();
            if (!ex) {
              await sb.from('monthly_revenue').insert({ property_id: prop.id, year:2026, month:mn, amount:row['売上'] });
            }
          }
        }
      }
      // 立上げ初期費 as variable expense for Feb (shared / kawaken)
      if (sanno) {
        const { data: ex } = await sb.from('monthly_variable_expenses').select('id')
          .eq('property_id', sanno.id).eq('year', 2026).eq('month', 2).eq('category', '立上げ初期費').maybeSingle();
        if (!ex) {
          await sb.from('monthly_variable_expenses').insert({ property_id: sanno.id, year:2026, month:2, category:'立上げ初期費', amount:5054695, payer:'kawaken', memo:'初期費用（山王・玉津 折半清算済み）' });
        }
      }
      setSeedMsg('✅ 2〜5月の実績データを入力しました。');
    } catch(e) { setSeedMsg('❌ ' + e.message); }
    finally { setSeeding(false); }
  }

  return (
    <Card className="p-4 border-gray-200 bg-gray-50">
      <button onClick={() => setOpen(o=>!o)} className="w-full flex items-center justify-between">
        <div className="flex items-center gap-2">
          <span className="text-xs font-bold text-gray-500 bg-gray-200 px-2 py-0.5 rounded-full">清算済</span>
          <p className="text-sm font-bold text-gray-600">前期記録（2026年2〜5月）</p>
        </div>
        <span className="text-gray-400 text-xs">{open ? '▲' : '▼'}</span>
      </button>
      {open && (
        <div className="mt-3 border-t pt-3 space-y-3">
          {/* Summary */}
          <div className="space-y-1">
            <Row label="立上げ初期費" value={fmt(initCost)} />
            <Row label="固定費合計（2〜5月）" value={fmt(fixedCost)} sub="家賃・光熱費等" />
            <Row label="山王売上（5月）" value={fmt(revenue)} />
            <div className="border-t pt-1">
              <Row label="差引合計" value={fmtSigned(-(initCost + fixedCost - revenue))} bold valueClass="text-red-500" />
            </div>
          </div>
          <div className="bg-green-50 border border-green-100 rounded-lg px-3 py-2 flex justify-between items-center">
            <span className="text-xs text-green-700 font-medium">一人あたり負担（清算済み）</span>
            <span className="text-sm font-bold text-green-700">{fmt(perPerson)}</span>
          </div>

          {/* Monthly detail toggle */}
          <div>
            <p className="text-xs text-gray-500 font-medium mb-2">月別・物件別明細</p>
            <div className="flex gap-2 mb-2">
              {['sanno','tamatsu'].map(k => (
                <button key={k} onClick={() => setDetail(detail===k ? null : k)}
                  className={`px-3 py-1 text-xs rounded-lg border ${detail===k ? 'bg-primary text-white border-primary' : 'border-gray-200 text-gray-500'}`}>
                  {PRIOR_DATA[k].name}
                </button>
              ))}
            </div>
            {detail && (
              <div className="space-y-2">
                {PRIOR_DATA[detail].months.map(row => {
                  const exp = ['家賃','電気代','ガス代','水道代','Wi-Fi費','ゴミ回収費','清掃費'].reduce((s,c)=>s+(row[c]||0),0);
                  return (
                    <div key={row.m} className="bg-white rounded-lg p-3 border border-gray-100">
                      <p className="text-xs font-bold text-gray-600 mb-1">{row.m}</p>
                      {['家賃','電気代','ガス代','水道代','Wi-Fi費','ゴミ回収費','清掃費'].map(cat => (row[cat]||0) > 0 ? (
                        <div key={cat} className="flex justify-between text-xs text-gray-500 py-0.5">
                          <span>{cat}</span><span>{fmt(row[cat])}</span>
                        </div>
                      ) : null)}
                      <div className="border-t mt-1 pt-1 flex justify-between text-xs font-medium text-gray-700">
                        <span>支出計</span><span>{fmt(exp)}</span>
                      </div>
                      {(row['売上']||0) > 0 && (
                        <div className="flex justify-between text-xs font-medium text-green-600 mt-0.5">
                          <span>売上</span><span>{fmt(row['売上'])}</span>
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            )}
          </div>

          {/* DB Seed button */}
          <div className="border-t pt-3">
            <p className="text-xs text-gray-400 mb-2">※ 6月より本アプリで管理。過去データをレポートに反映させる場合はDBに入力できます。</p>
            {seedMsg && <p className="text-sm mb-2">{seedMsg}</p>}
            <button onClick={seedHistorical} disabled={seeding}
              className="w-full text-sm text-gray-600 border border-gray-300 bg-white px-4 py-2 rounded-lg disabled:opacity-50">
              {seeding ? '入力中...' : '📥 2〜5月の実績をDBに入力する'}
            </button>
          </div>
        </div>
      )}
    </Card>
  );
}
